<div class="flex items-center gap-2">
  <button
    (click)="edit()"
    class="flex items-center justify-center w-9 h-9 rounded-lg bg-blue-50 text-blue-600 hover:bg-blue-100 hover:scale-105 active:scale-95 transition-all duration-150 shadow-sm"
    title="Modifier"
  >
    <lucide-icon [img]="Pencil" class="w-4 h-4"></lucide-icon>
  </button>

  <button
    (click)="delete()"
    class="flex items-center justify-center w-9 h-9 rounded-lg bg-red-50 text-red-600 hover:bg-red-100 hover:scale-105 active:scale-95 transition-all duration-150 shadow-sm"
    title="Supprimer"
  >
    <lucide-icon [img]="Trash2" class="w-4 h-4"></lucide-icon>
  </button>
</div>
